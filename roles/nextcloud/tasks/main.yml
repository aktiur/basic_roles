---
- ansible.builtin.fail: msg="La variable '{{ item }}' n'est pas définie"
  when: item not in hostvars[inventory_hostname]
  with_items:
   - nextcloud_domain

- name: installe le snap pour nextcloud
  community.general.snap:
    name: nextcloud
    state: present
    options:
      - nextcloud:ports.http={{ nextcloud_port }}

- name: ajoute l'accès aux médias externes au snap
  community.general.snap_connect:
    plug: nextcloud:removable-media
    slot: ":removable-media"

- name: S'assure que la configuration additionnelle de nextcloud est présente
  ansible.builtin.template:
    src: additional.config.php.j2
    dest: /var/snap/nextcloud/current/nextcloud/config/additional.config.php
    mode: u=rw,g=r

- name: S'assure que la configuration de caddy est présente
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/sites-available/nextcloud.site
    mode: "0644"
  notify: recharge Caddy

- name: S'assure que la configuration de caddy est active
  ansible.builtin.file:
    state: link
    path: "/etc/caddy/sites-enabled/10-nextcloud.site"
    src: ../sites-available/nextcloud.site
  notify: recharge Caddy
