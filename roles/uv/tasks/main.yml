- name: ensure uv is downloaded
  get_url:
    url: https://github.com/astral-sh/uv/releases/download/0.11.8/uv-x86_64-unknown-linux-gnu.tar.gz
    dest: /tmp/uv.tar.gz
    checksum: sha256:56dd1b66701ecb62fe896abb919444e4b83c5e8645cca953e6ddd496ff8a0feb

- name: ensure uv is installed
  ansible.builtin.unarchive:
    src: /tmp/uv.tar.gz
    remote_src: true
    dest: /usr/local/bin
    extra_opts:
      - --strip-components=1
