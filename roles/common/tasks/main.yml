---
- name: Check we are on Ubuntu release
  ansible.builtin.fail:
    msg: You need to use Ubuntu Server
  when: ansible_facts["distribution"] != "Ubuntu"

- name: Check we are on correct release
  ansible.builtin.fail:
    msg: You need to use one of the supported releases
  when: ansible_facts["distribution_release"] not in supported_releases

- name: Ensure hostname is correctly set
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Ensure sudoers file is present
  ansible.builtin.copy:
    src: sudoers
    dest: /etc/sudoers
    owner: root
    group: root
    mode: "0440"

- name: Upgrade apt packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time | default(7200) }}"

- name: Ensure essentials packages are installed
  ansible.builtin.apt:
    name:
      - build-essential
      - software-properties-common
      - apt-transport-https
      - apt-utils
      - debconf-utils
      - git
      - unzip
      - net-tools
      - ufw
      - sudo
      - rsyslog
      - fail2ban
    state: present

# to add label to a volume : 'e2label /dev/sda5 "MY_BACKUP"'
- name: Ensure additional filesystems are mounted
  ansible.posix.mount:
    state: mounted
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype | default('ext4') }}"
  loop: "{{ mounts }}"

- name: Configure additional adresses
  ansible.builtin.template:
    src: additional_ips.yaml.j2
    # bizarrement c'est la dernière IP ajoutée qui est utilisée par défaut
    # il faut donc que les IPs additionnelles soient ajoutées avant la configuration
    # issue de cloud-init (50 sur Ubuntu)
    dest: /etc/netplan/10-additional-ips.yaml
    owner: root
    group: root
    mode: "0600"
  when: additional_ip_addresses is defined and additional_ip_addresses | length > 0
  notify: apply netplan

- name: Ensure required locales are installed
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  with_items: "{{ locales }}"

- name: Ensure default locale is set
  ansible.builtin.lineinfile:
    path: /etc/default/locale
    regexp: "^LANG="
    line: "LANG={{ default_locale }}"
  when: default_locale is defined

- name: Ensure system wide known hosts file exists
  ansible.builtin.copy:
    src: ssh_known_hosts
    dest: /etc/ssh/ssh_known_hosts
    owner: root
    group: root
    mode: "0644"

- name: Ensure journal directory is created so that logs are persisted
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    group: systemd-journal
    mode: "02755"
  notify:
    - restart journald

- name: ufw allow ssh
  community.general.ufw:
    rule: allow
    port: "22"
    direction: in

- name: ufw block incoming by default
  community.general.ufw:
    policy: deny
    direction: incoming

- name: enable ufw
  ufw:
    state: enabled

- name: ensure diagnostic tools are installed
  apt:
    name:
      - mtr
      - knot-dnsutils
      - nmap
      - iftop
      - htop
      - vnstat
      - hping3
      - nload
